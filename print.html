<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anleitung drucken — Maschen & Maße</title>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --walnut: #241a10;
  --green:  #4a6b40;
  --terra:  #a05a3a;
  --text:   #1e1208;
  --textLight: #9c7b5a;
  --border: #ddd3c4;
  --bg:     #ede6db;
  --surface:#f8f3ed;
  --serif:  'Spectral', serif;
  --sans:   'DM Sans', sans-serif;
  --mono:   'DM Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  padding: 1.5rem;
  max-width: 800px;
  margin: 0 auto;
}

/* Druck-Button */
.print-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--walnut);
  padding: 0.85rem 1.25rem;
  border-radius: 12px;
  margin-bottom: 2rem;
}
.print-bar h1 { font-family: var(--serif); color: white; font-size: 1rem; }
.btn-print {
  background: var(--green);
  color: white;
  border: none;
  border-radius: 20px;
  padding: 0.5rem 1.25rem;
  font-family: var(--sans);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
}
.btn-back {
  background: rgba(255,255,255,0.1);
  color: white;
  border: none;
  border-radius: 20px;
  padding: 0.5rem 1rem;
  font-family: var(--sans);
  font-size: 0.85rem;
  cursor: pointer;
  margin-right: 0.5rem;
}

/* Größen-Auswahl */
.size-bar {
  background: var(--walnut);
  border-radius: 10px;
  padding: 0.75rem 1.25rem;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
}
.size-bar label {
  font-size: 0.72rem;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 600;
}
.size-bar select {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  color: white;
  font-family: var(--sans);
  font-size: 0.85rem;
  padding: 0.35rem 0.7rem;
  flex: 1;
}

/* Content */
.pattern-header {
  display: flex;
  gap: 1.5rem;
  align-items: flex-start;
  margin-bottom: 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 2px solid var(--walnut);
}
.pattern-img {
  width: 120px; height: 120px;
  border-radius: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 3rem;
  flex-shrink: 0;
  overflow: hidden;
}
.pattern-img img { width: 100%; height: 100%; object-fit: cover; }
.pattern-title { font-family: var(--serif); font-size: 2rem; font-weight: 700; line-height: 1.1; }
.pattern-kat { font-size: 0.75rem; color: var(--green); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.3rem; }
.pattern-meta { font-size: 0.85rem; color: var(--textLight); margin-top: 0.5rem; line-height: 1.8; }

/* Info-Grid */
.info-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.75rem;
  margin-bottom: 2rem;
}
.info-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.75rem;
}
.info-box-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--textLight); font-weight: 700; margin-bottom: 0.2rem; }
.info-box-val { font-family: var(--serif); font-size: 0.95rem; font-weight: 600; }

/* Tags */
.tags-row { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 1.5rem; }
.tag { background: #e4ede0; color: var(--green); border-radius: 12px; padding: 0.15rem 0.6rem; font-size: 0.72rem; font-weight: 600; }

/* Sections */
.section { margin-bottom: 2rem; }
.section-title {
  font-family: var(--serif);
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--walnut);
  border-bottom: 1.5px solid var(--border);
  padding-bottom: 0.4rem;
  margin-bottom: 0.85rem;
}

/* Garn */
.yarn-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.75rem 1rem;
  margin-bottom: 0.5rem;
  font-size: 0.88rem;
}
.yarn-name { font-weight: 600; margin-bottom: 0.2rem; }
.yarn-detail { color: var(--textLight); font-size: 0.8rem; line-height: 1.6; }

/* Maschen */
.maschen-chips { display: flex; flex-wrap: wrap; gap: 0.35rem; }
.maschen-chip { background: #e4ede0; color: var(--green); border-radius: 12px; padding: 0.15rem 0.6rem; font-size: 0.75rem; }

/* Schnittteile */
.schnitt-item {
  background: var(--surface);
  border-left: 3px solid var(--green);
  border-radius: 0 8px 8px 0;
  padding: 0.75rem 1rem;
  margin-bottom: 0.75rem;
}
.schnitt-name { font-weight: 600; font-family: var(--serif); margin-bottom: 0.35rem; }
.schnitt-detail { font-size: 0.82rem; color: var(--textLight); margin-bottom: 0.1rem; }
.schnitt-highlight { font-family: var(--mono); font-size: 0.88rem; color: var(--green); font-weight: 700; }

/* Anleitung */
.anl-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 1rem;
}
.anl-block-header {
  background: var(--walnut);
  padding: 0.5rem 1rem;
  font-size: 0.75rem;
  font-weight: 700;
  color: rgba(255,255,255,0.8);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.anl-step {
  display: flex;
  gap: 0.75rem;
  padding: 0.6rem 1rem;
  border-bottom: 1px solid var(--border);
  align-items: baseline;
}
.anl-step:last-child { border-bottom: none; }
.anl-step-nr {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--textLight);
  font-weight: 700;
  min-width: 24px;
  flex-shrink: 0;
}
.anl-step-text {
  font-size: 0.92rem;
  color: var(--text);
  line-height: 1.5;
}
.anl-step-maschen {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--textLight);
  margin-left: auto;
  flex-shrink: 0;
}

/* Abbr */
.abbr-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.85rem 1rem;
  font-size: 0.85rem;
  line-height: 1.8;
  white-space: pre-line;
  color: var(--textLight);
}

/* Druck-Styles */
@media print {
  .print-bar, .size-bar { display: none !important; }
  body { background: white; padding: 0; }
  .section { page-break-inside: avoid; }
  .anl-block { page-break-inside: avoid; }
}
</style>

function roundToRapport(raw, mult, plus) {
  mult = +mult||0; plus = +plus||0;
  if (mult<=1) return Math.round(raw);
  const nLow=Math.floor((raw-plus)/mult), nHigh=Math.ceil((raw-plus)/mult);
  const vLow=nLow*mult+plus, vHigh=nHigh*mult+plus;
  return Math.abs(vLow-raw)<=Math.abs(vHigh-raw)?vLow:vHigh;
}

function parseBlock(input) {
  if (!input||!input.trim()) return [];
  const parts=[]; let i=0; const str=input.trim();
  while(i<str.length){
    if(str[i]==='['){const end=str.indexOf(']',i);if(end===-1)break;parts.push({typ:'code',raw:str.slice(i+1,end)});i=end+1;}
    else if(str[i]==='('){const end=str.indexOf(')',i);if(end===-1)break;parts.push({typ:'notiz',raw:str.slice(i+1,end)});i=end+1;}
    else{i++;}
  }
  return parts;
}

function skaliere(codeRaw, sfB, sfH, rapport, rapportPlus, laufend) {
  const c=codeRaw.trim(); const nums=[]; c.replace(/(\d+(?:\.\d+)?)/g,(m,n)=>nums.push(+n));
  if(/^(\d+)M AS$/.test(c)){const sM=roundToRapport(nums[0]*sfB,rapport,rapportPlus);return{text:`${sM} Maschen anschlagen`,delta:sM};}
  if(/^(\d+)R Ger\.$/.test(c)){return{text:`${Math.round(nums[0]*sfH)} Reihen gerade häkeln`,delta:0};}
  if(/^(\d+)R Wend\.$/.test(c)){return{text:`${Math.round(nums[0]*sfH)} Wendetouren`,delta:0};}
  if(/^(\d+)R Rd\.$/.test(c)){return{text:`${Math.round(nums[0]*sfH)} Runden häkeln`,delta:0};}
  if(/^(\d+)M Abket\. bds\.$/.test(c)){const sM=roundToRapport(nums[0]*sfB,rapport,rapportPlus);return{text:`${sM} Maschen abketten je Seite`,delta:-(sM*2)};}
  if(/^(\d+)M Abket\. eins\.$/.test(c)){const sM=roundToRapport(nums[0]*sfB,rapport,rapportPlus);return{text:`${sM} Maschen abketten`,delta:-sM};}
  if(/^(\d+)M Abn\. bds\.$/.test(c)){const sM=roundToRapport(nums[0]*sfB,rapport,rapportPlus);return{text:`${sM} Maschen abnehmen je Seite`,delta:-(sM*2)};}
  if(/^(\d+)M Abn\. eins\.$/.test(c)){const sM=roundToRapport(nums[0]*sfB,rapport,rapportPlus);return{text:`${sM} Maschen abnehmen`,delta:-sM};}
  if(/^(\d+)M Zun\. bds\.$/.test(c)){const sM=roundToRapport(nums[0]*sfB,rapport,rapportPlus);return{text:`${sM} Maschen zunehmen je Seite`,delta:sM*2};}
  if(/^(\d+)M Abn\. bds\. \/ (\d+)R \/ (\d+)x$/.test(c)){const sM=roundToRapport(nums[0]*sfB,rapport,rapportPlus),sR=Math.round(nums[1]*sfH),wdh=nums[2];const c2=Math.floor(sR/wdh),d=sR%wdh,e=wdh-d;const mf=d===0?`alle ${c2} R, ${wdh}×`:`${e}× alle ${c2} R, dann ${d}× alle ${c2+1} R`;return{text:`${sM} Maschen abnehmen je Seite — ${mf}`,delta:-(sM*2*wdh)};}
  if(/^Rest Abket\. bds\.$/.test(c)){const je=Math.floor(laufend/2);return{text:`${je} Maschen abketten je Seite`,delta:-laufend};}
  if(/^Rest Abket\. eins\.$/.test(c)){return{text:`${laufend} Maschen abketten`,delta:-laufend};}
  if(c==='Faden abschneiden')return{text:'Faden abschneiden und vernähen',delta:0};
  return{text:codeRaw,delta:0};
}

function genOutput(schritte, sfB, sfH, rapport, rapportPlus) {
  let laufend=0;
  return schritte.map((s,i)=>{
    const parts=parseBlock(s.code); let text=''; let delta=0;
    parts.forEach(part=>{
      if(part.typ==='code'){const r=skaliere(part.raw,sfB,sfH,rapport,rapportPlus,laufend);if(r){text+=r.text;delta+=r.delta||0;}}
      else if(part.typ==='notiz'){text+=` — ${part.raw}`;}
    });
    laufend+=delta;
    return{nr:i+1,text,maschen:laufend>0?laufend:null};
  }).filter(r=>r.text);
}

// Lade Anleitung aus localStorage
let pattern = null;

function loadPattern() {
  try {
    const urlParams = new URLSearchParams(window.location.search);
    const id = +urlParams.get('id');
    const saved = localStorage.getItem('mm_state');
    if (saved && id) {
      const state = JSON.parse(saved);
      pattern = state.patterns.find(p => p.id === id);
    }
  } catch(e) {}
}

function renderPrint() {
  if (!pattern) {
    document.getElementById('print-content').innerHTML = '<p style="text-align:center;padding:3rem;color:#999;">Anleitung nicht gefunden. Bitte von der App aus öffnen.</p>';
    return;
  }

  const sizeKey = document.getElementById('print-size').value;
  const p = pattern;

  document.title = `${p.title} — Maschen & Maße`;
  document.getElementById('print-title').textContent = p.title;

  let html = '';

  // Header
  const thumb = p.images && p.images.length > 0 ? `<img src="${p.images[0]}" alt="">` : (p.emoji || '🧶');
  html += `<div class="pattern-header">
    <div class="pattern-img">${thumb}</div>
    <div>
      <p class="pattern-kat">${p.kat || 'Anleitung'}</p>
      <h1 class="pattern-title">${p.title}</h1>
      <p class="pattern-meta">
        ${p.needle ? `⚙ ${p.needle}` : ''}
        ${p.gaugeM ? ` · ${p.gaugeM}M / ${p.gaugeR||'?'}R pro 10 cm` : ''}
        ${p.diff ? ` · ${ ['','Einfach','Mittel','Fortgeschritten'][p.diff] }` : ''}
      </p>
    </div>
  </div>`;

  // Tags
  if (p.tags && p.tags.length) {
    html += `<div class="tags-row">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>`;
  }

  // Info-Grid
  html += `<div class="info-grid">
    ${p.needle ? `<div class="info-box"><div class="info-box-label">Nadel</div><div class="info-box-val">${p.needle}</div></div>` : ''}
    ${p.gaugeM ? `<div class="info-box"><div class="info-box-label">Maschenprobe</div><div class="info-box-val">${p.gaugeM}M · ${p.gaugeR||'?'}R / 10cm</div></div>` : ''}
    <div class="info-box"><div class="info-box-label">Größe</div><div class="info-box-val">${sizeKey.replace('_',' ').toUpperCase()}</div></div>
  </div>`;

  // Maschen
  if (p.maschen && p.maschen.length) {
    html += `<div class="section">
      <h2 class="section-title">Muster & Maschenarten</h2>
      <div class="maschen-chips">${p.maschen.map(m => `<span class="maschen-chip">${m}</span>`).join('')}</div>
    </div>`;
  }

  // Abkürzungen
  if (p.abbr && p.abbr.trim()) {
    html += `<div class="section">
      <h2 class="section-title">Abkürzungen</h2>
      <div class="abbr-box">${p.abbr}</div>
    </div>`;
  }

  // Schnittteile
  if (p.schnitt && p.schnitt.length) {
    html += `<div class="section"><h2 class="section-title">Schnittteile</h2>`;
    p.schnitt.forEach(s => {
      const massKey = s.massKey || 'bust';
      const baseMassVal = +s.baseMassVal || 0;
      const ease = +s.ease || 0;
      const teiltyp = s.teiltyp || 'halb';
      const easeDivisor = teiltyp === 'ganz' ? 1 : 2;
      const easeProTeil = ease / easeDivisor;
      const basisMitEase = baseMassVal + easeProTeil;
      const targetMeas = BODY_MEAS_FULL[sizeKey];
      let fertigmass = '';
      if (targetMeas && massKey !== 'none' && baseMassVal > 0) {
        const zielKoerper = targetMeas[massKey];
        if (zielKoerper) {
          const zielMitEase = zielKoerper + easeProTeil;
          fertigmass = `${zielMitEase.toFixed(1)} cm`;
        }
      }
      html += `<div class="schnitt-item">
        <div class="schnitt-name">${s.name}</div>
        ${fertigmass ? `<div class="schnitt-highlight">Fertigmaß: ${fertigmass}</div>` : ''}
        ${ease ? `<div class="schnitt-detail">Ease: +${ease} cm gesamt (÷${easeDivisor} = +${easeProTeil.toFixed(1)} cm pro Teil)</div>` : ''}
      </div>`;
    });
    html += `</div>`;
  }

  // Anleitung
  const anlSchritte = p.anleitungSchritte || {};
  const allKeys = ['__allgemein__', ...(p.schnitt||[]).map(s => s.name)];
  let hasAnleitung = false;

  allKeys.forEach(key => {
    const schritte = anlSchritte[key] || [];
    if (!schritte.length) return;
    hasAnleitung = true;

    const schnittTeil = (p.schnitt||[]).find(s => s.name === key);
    let sfB=1, sfH=1, rapport=0, rapportPlus=0;
    if (schnittTeil) {
      const massKey = schnittTeil.massKey || 'bust';
      const baseMassVal = +schnittTeil.baseMassVal || 0;
      const ease = +schnittTeil.ease || 0;
      const teiltyp = schnittTeil.teiltyp || 'halb';
      const easeDivisor = teiltyp === 'ganz' ? 1 : 2;
      const easeProTeil = ease / easeDivisor;
      const basisMitEase = baseMassVal + easeProTeil;
      const targetMeas = BODY_MEAS_FULL[sizeKey];
      if (targetMeas && massKey !== 'none' && baseMassVal > 0) {
        const tm = targetMeas[massKey];
        if (tm) { const ziel = tm + easeProTeil; sfB = basisMitEase > 0 ? ziel/basisMitEase : tm/baseMassVal; sfH=sfB; }
      }
      rapport = +schnittTeil.rapport||0;
      rapportPlus = +schnittTeil.rapportPlus||0;
    }

    const rows = genOutput(schritte, sfB, sfH, rapport, rapportPlus);
    if (!rows.length) return;

    const label = key === '__allgemein__' ? 'Anleitung' : key;
    html += `<div class="section">
      <h2 class="section-title">${label}</h2>
      <div class="anl-block">
        <div class="anl-block-header">${sizeKey.replace('_',' ').toUpperCase()}</div>
        ${rows.map(r => `<div class="anl-step">
          <span class="anl-step-nr">${r.nr}</span>
          <span class="anl-step-text">${r.text}</span>
          ${r.maschen ? `<span class="anl-step-maschen">${r.maschen}M</span>` : ''}
        </div>`).join('')}
      </div>
    </div>`;
  });

  // Fallback: Legacy-Freitext
  if (!hasAnleitung && p.text && p.text.trim()) {
    html += `<div class="section">
      <h2 class="section-title">Anleitung</h2>
      <div class="anl-block" style="padding:1rem;font-family:Georgia,serif;line-height:1.8;white-space:pre-wrap;">${p.text}</div>
    </div>`;
  }

  // Kein Inhalt
  if (!hasAnleitung && (!p.text || !p.text.trim())) {
    html += `<div class="section"><p style="color:#999;text-align:center;padding:2rem;">Noch keine Anleitung vorhanden.</p></div>`;
  }
}

loadPattern();
renderPrint();
</script>
</body>
</html>
